<!DOCTYPE html>
<html>
<head>
  <title>Payment Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fffaf3;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: darkred;
      margin-bottom: 20px;
    }

    .payment-container {
      max-width: 500px;
      margin: auto;
      background: #fdfdfd;
      border: 2px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    .section {
      margin-bottom: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #fff8e7;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #aaa;
      border-radius: 6px;
    }

    .summary {
      font-size: 16px;
      color: navy;
    }

    .pay-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: crimson;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
    }

    .pay-btn:hover {
      background: darkred;
    }
  </style>
</head>
<body>

  <h1>Your Payment </h1>
  <h2>This demo payment page is for project purpose only..</h2>

  <div class="payment-container">

    <!-- Order Summary -->
    <div class="section summary">
      <h2>Order Summary</h2>
      <p>Selected Gift Item</p>
      <p><strong>Total: ₹ ....</strong></p>
    </div>

    <!-- Payment Details -->
    <div class="section">
      <h2>Payment Details</h2>
      <label for="cardname">Cardholder Name</label>
      <input type="text" id="cardname" placeholder="Enter name">

      <label for="cardnumber">Card Number</label>
      <input type="text" id="cardnumber" value="XXXX-XXXX-XXXX-XXXX" readonly>
      <label for="expiry">Expiry Date</label>
      <input type="text" id="expiry" placeholder="MM/YY">

      <label for="cvv">CVV</label>
      <input type="text" id="cvv" placeholder="123">
    </div>

    <!-- Pay Button -->
    <button class="pay-btn">Pay Now</button>

  </div>

</body>
</html>
